<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="./logo.png">
  <title>弥散渐变生成器 - 控制面板</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      background-color: #000;
    }
    #root {
      width: 100%;
      height: 100%;
    }
    .canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .logo-container {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
    }
    .logo-container img {
      height: 60px;
      width: auto;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
    }
    @media (max-width: 768px) {
      .logo-container img {
        height: 45px;
      }
    }
    .control-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 340px;
      max-height: calc(100vh - 40px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 24px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(100px);
      -webkit-backdrop-filter: blur(100px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), 0 0 0 0.5px rgba(255, 255, 255, 0.05) inset;
      z-index: 100;
    }
    .panel-scroll-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      margin-right: -8px;
      padding-right: 8px;
    }
    .panel-scroll-content::-webkit-scrollbar {
      display: none;
    }
    .panel-scroll-content {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @media (max-width: 768px) {
      .control-panel {
        top: auto;
        bottom: 20px;
        right: 20px;
        left: 20px;
        width: auto;
        max-height: 50vh;
      }
    }
    .panel-title {
      color: #ffffff;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.4px;
    }
    .nav-container {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      padding: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
    }
    .nav-item {
      flex: 1;
      padding: 10px 16px;
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .nav-item:hover {
      color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.05);
    }
    .nav-item.active {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.15);
      font-weight: 600;
    }
    .code-block-container {
      margin-top: 8px;
    }
    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .code-label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .copy-button {
      padding: 8px 16px;
      background: rgba(82, 39, 255, 0.6);
      border: 1px solid rgba(82, 39, 255, 0.4);
      border-radius: 10px;
      color: #ffffff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .copy-button:hover {
      background: rgba(82, 39, 255, 0.8);
      transform: translateY(-1px);
    }
    .copy-button:active {
      transform: translateY(0);
    }
    .copy-button.copied {
      background: rgba(52, 211, 153, 0.6);
      border-color: rgba(52, 211, 153, 0.4);
    }
    .code-block {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 16px;
      overflow-x: auto;
      max-height: 400px;
      overflow-y: auto;
    }
    .code-block::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    .code-block::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }
    .code-block pre {
      margin: 0;
      font-family: 'SF Mono', 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: #e0e0e0;
      white-space: pre;
    }
    .code-keyword {
      color: #c792ea;
    }
    .code-string {
      color: #c3e88d;
    }
    .code-number {
      color: #f78c6c;
    }
    .code-prop {
      color: #82aaff;
    }
    .download-section {
      margin-top: 16px;
      padding-top: 16px;
      flex-shrink: 0;
    }
    .download-button-container {
      position: relative;
      width: 100%;
    }
    .download-button {
      width: 100%;
      padding: 16px 20px 20px 20px;
      background: #FFFFFF;
      border: none;
      border-radius: 16px;
      color: #000000;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }
    .download-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }
    .download-button:active {
      transform: translateY(0);
    }
    .download-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .control-group {
      margin-bottom: 20px;
    }
    .control-label {
      display: block;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 10px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .color-row {
      display: flex;
      gap: 14px;
    }
    .color-input-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .color-input-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .color-input-wrapper:hover {
      transform: scale(1.03);
      border-color: rgba(255, 255, 255, 0.25);
    }
    .color-preview {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 16px;
    }
    .color-input {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    .color-label {
      display: block;
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      font-weight: 500;
      margin-top: 8px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .slider-container {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      cursor: pointer;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(0, 0, 0, 0.05);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.1);
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.05);
    }
    .slider::-webkit-slider-thumb:active {
      transform: scale(1.05);
    }
    .slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(0, 0, 0, 0.05);
    }
    .slider-value {
      min-width: 56px;
      text-align: right;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.2px;
    }
    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      margin: 24px 0;
    }
    .section-title {
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 16px;
    }
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    .toggle-label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      font-weight: 500;
    }
    .toggle-switch {
      position: relative;
      width: 52px;
      height: 28px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .toggle-switch.active {
      background: rgba(82, 39, 255, 0.6);
      border-color: rgba(82, 39, 255, 0.4);
    }
    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }
    .toggle-switch.active .toggle-thumb {
      transform: translateX(24px);
    }
    .dot-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }
    .dot-grid__wrap {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .dot-grid__canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel" data-presets="react,env">
    const { useState, useRef, useEffect, useCallback, useMemo } = React;

    const hexToRgb = (hex) => {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      if (!result) return [1, 1, 1];
      return [
        parseInt(result[1], 16) / 255,
        parseInt(result[2], 16) / 255,
        parseInt(result[3], 16) / 255
      ];
    };

    const CanvasComponent = ({ params, grainEnabled = false }) => {
      const canvasRef = useRef(null);
      const glRef = useRef(null);
      const programRef = useRef(null);
      const uniformsRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;

        const gl = canvas.getContext('webgl2');
        if (!gl) {
          console.error('WebGL2 not supported');
          return;
        }
        glRef.current = gl;

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          gl.viewport(0, 0, canvas.width, canvas.height);
        };
        resize();
        window.addEventListener('resize', resize);

        const vertexShaderSource = `#version 300 es
          in vec2 position;
          void main() {
            gl_Position = vec4(position, 0.0, 1.0);
          }
        `;

        const fragmentShaderSource = `#version 300 es
          precision highp float;
          uniform vec2 iResolution;
          uniform float iTime;
          uniform float uTimeSpeed;
          uniform float uColorBalance;
          uniform float uWarpStrength;
          uniform float uWarpFrequency;
          uniform float uWarpSpeed;
          uniform float uWarpAmplitude;
          uniform float uBlendAngle;
          uniform float uBlendSoftness;
          uniform float uRotationAmount;
          uniform float uNoiseScale;
          uniform float uGrainAmount;
          uniform float uGrainScale;
          uniform float uGrainAnimated;
          uniform float uContrast;
          uniform float uGamma;
          uniform float uSaturation;
          uniform vec2 uCenterOffset;
          uniform float uZoom;
          uniform vec3 uColor1;
          uniform vec3 uColor2;
          uniform vec3 uColor3;
          uniform float uGrainEnabled;
          out vec4 fragColor;
          
          #define S(a,b,t) smoothstep(a,b,t)
          
          mat2 Rot(float a) {
            float s = sin(a), c = cos(a);
            return mat2(c, -s, s, c);
          }
          
          vec2 hash(vec2 p) {
            p = vec2(dot(p, vec2(2127.1, 81.17)), dot(p, vec2(1269.5, 283.37)));
            return fract(sin(p) * 43758.5453);
          }
          
          float noise(vec2 p) {
            vec2 i = floor(p), f = fract(p), u = f * f * (3.0 - 2.0 * f);
            float n = mix(
              mix(
                dot(-1.0 + 2.0 * hash(i + vec2(0.0, 0.0)), f - vec2(0.0, 0.0)),
                dot(-1.0 + 2.0 * hash(i + vec2(1.0, 0.0)), f - vec2(1.0, 0.0)),
                u.x
              ),
              mix(
                dot(-1.0 + 2.0 * hash(i + vec2(0.0, 1.0)), f - vec2(0.0, 1.0)),
                dot(-1.0 + 2.0 * hash(i + vec2(1.0, 1.0)), f - vec2(1.0, 1.0)),
                u.x
              ),
              u.y
            );
            return 0.5 + 0.5 * n;
          }
          
          void mainImage(out vec4 o, vec2 C) {
            float t = iTime * uTimeSpeed;
            vec2 uv = C / iResolution.xy;
            float ratio = iResolution.x / iResolution.y;
            vec2 tuv = uv - 0.5 + uCenterOffset;
            tuv /= max(uZoom, 0.001);
            
            float degree = noise(vec2(t * 0.1, tuv.x * tuv.y) * uNoiseScale);
            tuv.y *= 1.0 / ratio;
            tuv *= Rot(radians((degree - 0.5) * uRotationAmount + 180.0));
            tuv.y *= ratio;
            
            float frequency = uWarpFrequency;
            float ws = max(uWarpStrength, 0.001);
            float amplitude = uWarpAmplitude / ws;
            float warpTime = t * uWarpSpeed;
            tuv.x += sin(tuv.y * frequency + warpTime) / amplitude;
            tuv.y += sin(tuv.x * (frequency * 1.5) + warpTime) / (amplitude * 0.5);
            
            vec3 colLav = uColor1;
            vec3 colOrg = uColor2;
            vec3 colDark = uColor3;
            float b = uColorBalance;
            float s = max(uBlendSoftness, 0.0);
            mat2 blendRot = Rot(radians(uBlendAngle));
            float blendX = (tuv * blendRot).x;
            float edge0 = -0.3 - b - s;
            float edge1 = 0.2 - b + s;
            float v0 = 0.5 - b + s;
            float v1 = -0.3 - b - s;
            vec3 layer1 = mix(colDark, colOrg, S(edge0, edge1, blendX));
            vec3 layer2 = mix(colOrg, colLav, S(edge0, edge1, blendX));
            vec3 col = mix(layer1, layer2, S(v0, v1, tuv.y));
            
            col = (col - 0.5) * uContrast + 0.5;
            float luma = dot(col, vec3(0.2126, 0.7152, 0.0722));
            col = mix(vec3(luma), col, uSaturation);
            col = pow(max(col, 0.0), vec3(1.0 / max(uGamma, 0.001)));
            col = clamp(col, 0.0, 1.0);
            
            if (uGrainEnabled > 0.5) {
              float grain = fract(sin(dot(C.xy, vec2(12.9898, 78.233))) * 43758.5453);
              col += (grain - 0.5) * 0.08;
              col = clamp(col, 0.0, 1.0);
            }
            
            o = vec4(col, 1.0);
          }
          
          void main() {
            vec4 o = vec4(0.0);
            mainImage(o, gl_FragCoord.xy);
            fragColor = o;
          }
        `;

        const compileShader = (type, source) => {
          const shader = gl.createShader(type);
          gl.shaderSource(shader, source);
          gl.compileShader(shader);
          if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error('Shader compile error:', gl.getShaderInfoLog(shader));
            return null;
          }
          return shader;
        };

        const vertexShader = compileShader(gl.VERTEX_SHADER, vertexShaderSource);
        const fragmentShader = compileShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);
        programRef.current = program;

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
          console.error('Program link error:', gl.getProgramInfoLog(program));
          return;
        }

        gl.useProgram(program);

        const positions = new Float32Array([-1, -1, 3, -1, -1, 3]);
        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

        const positionLocation = gl.getAttribLocation(program, 'position');
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        uniformsRef.current = {
          iResolution: gl.getUniformLocation(program, 'iResolution'),
          iTime: gl.getUniformLocation(program, 'iTime'),
          uTimeSpeed: gl.getUniformLocation(program, 'uTimeSpeed'),
          uColorBalance: gl.getUniformLocation(program, 'uColorBalance'),
          uWarpStrength: gl.getUniformLocation(program, 'uWarpStrength'),
          uWarpFrequency: gl.getUniformLocation(program, 'uWarpFrequency'),
          uWarpSpeed: gl.getUniformLocation(program, 'uWarpSpeed'),
          uWarpAmplitude: gl.getUniformLocation(program, 'uWarpAmplitude'),
          uBlendAngle: gl.getUniformLocation(program, 'uBlendAngle'),
          uBlendSoftness: gl.getUniformLocation(program, 'uBlendSoftness'),
          uRotationAmount: gl.getUniformLocation(program, 'uRotationAmount'),
          uNoiseScale: gl.getUniformLocation(program, 'uNoiseScale'),
          uGrainAmount: gl.getUniformLocation(program, 'uGrainAmount'),
          uGrainScale: gl.getUniformLocation(program, 'uGrainScale'),
          uGrainAnimated: gl.getUniformLocation(program, 'uGrainAnimated'),
          uContrast: gl.getUniformLocation(program, 'uContrast'),
          uGamma: gl.getUniformLocation(program, 'uGamma'),
          uSaturation: gl.getUniformLocation(program, 'uSaturation'),
          uCenterOffset: gl.getUniformLocation(program, 'uCenterOffset'),
          uZoom: gl.getUniformLocation(program, 'uZoom'),
          uColor1: gl.getUniformLocation(program, 'uColor1'),
          uColor2: gl.getUniformLocation(program, 'uColor2'),
          uColor3: gl.getUniformLocation(program, 'uColor3'),
          uGrainEnabled: gl.getUniformLocation(program, 'uGrainEnabled')
        };

        const startTime = performance.now();
        
        const render = (time) => {
          const t = (time - startTime) / 1000;
          
          const color1 = hexToRgb(params.color1);
          const color2 = hexToRgb(params.color2);
          const color3 = hexToRgb(params.color3);
          
          gl.uniform2f(uniformsRef.current.iResolution, canvas.width, canvas.height);
          gl.uniform1f(uniformsRef.current.iTime, t);
          gl.uniform1f(uniformsRef.current.uTimeSpeed, params.timeSpeed);
          gl.uniform1f(uniformsRef.current.uColorBalance, params.colorBalance);
          gl.uniform1f(uniformsRef.current.uWarpStrength, params.warpStrength);
          gl.uniform1f(uniformsRef.current.uWarpFrequency, params.warpFrequency);
          gl.uniform1f(uniformsRef.current.uWarpSpeed, params.warpSpeed);
          gl.uniform1f(uniformsRef.current.uWarpAmplitude, params.warpAmplitude);
          gl.uniform1f(uniformsRef.current.uBlendAngle, 0);
          gl.uniform1f(uniformsRef.current.uBlendSoftness, 0.05);
          gl.uniform1f(uniformsRef.current.uRotationAmount, 500);
          gl.uniform1f(uniformsRef.current.uNoiseScale, 2);
          gl.uniform1f(uniformsRef.current.uGrainAmount, 0.1);
          gl.uniform1f(uniformsRef.current.uGrainScale, 2);
          gl.uniform1f(uniformsRef.current.uGrainAnimated, 0);
          gl.uniform1f(uniformsRef.current.uContrast, 1.5);
          gl.uniform1f(uniformsRef.current.uGamma, 1);
          gl.uniform1f(uniformsRef.current.uSaturation, 1);
          gl.uniform2f(uniformsRef.current.uCenterOffset, 0, 0);
          gl.uniform1f(uniformsRef.current.uZoom, params.zoom);
          gl.uniform3fv(uniformsRef.current.uColor1, color1);
          gl.uniform3fv(uniformsRef.current.uColor2, color2);
          gl.uniform3fv(uniformsRef.current.uColor3, color3);
          gl.uniform1f(uniformsRef.current.uGrainEnabled, grainEnabled ? 1.0 : 0.0);
          
          gl.drawArrays(gl.TRIANGLES, 0, 3);
          requestAnimationFrame(render);
        };
        
        requestAnimationFrame(render);

        return () => {
          window.removeEventListener('resize', resize);
        };
      }, [params, grainEnabled]);

      return (
        <div className="canvas-container">
          <canvas ref={canvasRef} />
        </div>
      );
    };

    const ControlSlider = ({ label, value, min, max, step, onChange }) => {
      return (
        <div className="control-group">
          <label className="control-label">{label}</label>
          <div className="slider-container">
            <input
              type="range"
              className="slider"
              min={min}
              max={max}
              step={step}
              value={value}
              onChange={(e) => onChange(parseFloat(e.target.value))}
            />
            <span className="slider-value">{value.toFixed(2)}</span>
          </div>
        </div>
      );
    };

    const ColorInput = ({ label, value, onChange }) => {
      return (
        <div className="color-input-container">
          <div className="color-input-wrapper">
            <div className="color-preview" style={{ backgroundColor: value }}></div>
            <input
              type="color"
              className="color-input"
              value={value}
              onChange={(e) => onChange(e.target.value)}
            />
          </div>
          <span className="color-label">{label}</span>
        </div>
      );
    };

    const ToggleSwitch = ({ active, onToggle, label }) => {
      return (
        <div className="toggle-container">
          <span className="toggle-label">{label}</span>
          <div 
            className={`toggle-switch ${active ? 'active' : ''}`}
            onClick={onToggle}
          >
            <div className="toggle-thumb" />
          </div>
        </div>
      );
    };

    const DotGrid = ({
      dotSize = 5,
      gap = 15,
      baseColor = '#FFFFFF',
      baseOpacity = 0.12,
      activeColor = '#FFFFFF',
      activeOpacity = 0.6,
      proximity = 120
    }) => {
      const wrapperRef = useRef(null);
      const canvasRef = useRef(null);
      const dotsRef = useRef([]);
      const pointerRef = useRef({ x: 0, y: 0 });

      const baseRgb = useMemo(() => {
        const m = baseColor.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
        if (!m) return { r: 255, g: 255, b: 255 };
        return {
          r: parseInt(m[1], 16),
          g: parseInt(m[2], 16),
          b: parseInt(m[3], 16)
        };
      }, [baseColor]);

      const activeRgb = useMemo(() => {
        const m = activeColor.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
        if (!m) return { r: 255, g: 255, b: 255 };
        return {
          r: parseInt(m[1], 16),
          g: parseInt(m[2], 16),
          b: parseInt(m[3], 16)
        };
      }, [activeColor]);

      const buildGrid = useCallback(() => {
        const wrap = wrapperRef.current;
        const canvas = canvasRef.current;
        if (!wrap || !canvas) return;

        const { width, height } = wrap.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;

        canvas.width = width * dpr;
        canvas.height = height * dpr;
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        const ctx = canvas.getContext('2d');
        if (ctx) ctx.scale(dpr, dpr);

        const cols = Math.floor((width + gap) / (dotSize + gap));
        const rows = Math.floor((height + gap) / (dotSize + gap));
        const cell = dotSize + gap;

        const gridW = cell * cols - gap;
        const gridH = cell * rows - gap;

        const extraX = width - gridW;
        const extraY = height - gridH;

        const startX = extraX / 2 + dotSize / 2;
        const startY = extraY / 2 + dotSize / 2;

        const dots = [];
        for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
            const cx = startX + x * cell;
            const cy = startY + y * cell;
            dots.push({ cx, cy });
          }
        }
        dotsRef.current = dots;
      }, [dotSize, gap]);

      useEffect(() => {
        let rafId;
        const proxSq = proximity * proximity;

        const draw = () => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          if (!ctx) return;
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          const { x: px, y: py } = pointerRef.current;

          for (const dot of dotsRef.current) {
            const dx = dot.cx - px;
            const dy = dot.cy - py;
            const dsq = dx * dx + dy * dy;

            let style = `rgba(${baseRgb.r},${baseRgb.g},${baseRgb.b},${baseOpacity})`;
            if (dsq <= proxSq) {
              const dist = Math.sqrt(dsq);
              const t = 1 - dist / proximity;
              const r = Math.round(baseRgb.r + (activeRgb.r - baseRgb.r) * t);
              const g = Math.round(baseRgb.g + (activeRgb.g - baseRgb.g) * t);
              const b = Math.round(baseRgb.b + (activeRgb.b - baseRgb.b) * t);
              const a = baseOpacity + (activeOpacity - baseOpacity) * t;
              style = `rgba(${r},${g},${b},${a})`;
            }

            ctx.beginPath();
            ctx.arc(dot.cx, dot.cy, dotSize / 2, 0, Math.PI * 2);
            ctx.fillStyle = style;
            ctx.fill();
          }

          rafId = requestAnimationFrame(draw);
        };

        draw();
        return () => cancelAnimationFrame(rafId);
      }, [proximity, baseColor, activeRgb, baseRgb, dotSize]);

      useEffect(() => {
        buildGrid();
        let ro = null;
        if ('ResizeObserver' in window) {
          ro = new ResizeObserver(buildGrid);
          wrapperRef.current && ro.observe(wrapperRef.current);
        } else {
          window.addEventListener('resize', buildGrid);
        }
        return () => {
          if (ro) ro.disconnect();
          else window.removeEventListener('resize', buildGrid);
        };
      }, [buildGrid]);

      useEffect(() => {
        const onMove = e => {
          const rect = canvasRef.current.getBoundingClientRect();
          pointerRef.current.x = e.clientX - rect.left;
          pointerRef.current.y = e.clientY - rect.top;
        };

        window.addEventListener('mousemove', onMove, { passive: true });
        return () => {
          window.removeEventListener('mousemove', onMove);
        };
      }, []);

      return (
        <section className="dot-grid">
          <div ref={wrapperRef} className="dot-grid__wrap">
            <canvas ref={canvasRef} className="dot-grid__canvas" />
          </div>
        </section>
      );
    };

    const Nav = ({ activeTab, onTabChange }) => {
      return (
        <div className="nav-container">
          <div
            className={`nav-item ${activeTab === 'preview' ? 'active' : ''}`}
            onClick={() => onTabChange('preview')}
          >
            预览配置
          </div>
          <div
            className={`nav-item ${activeTab === 'code' ? 'active' : ''}`}
            onClick={() => onTabChange('code')}
          >
            Code
          </div>
        </div>
      );
    };

    const CodePreview = ({ params, dotGridEnabled, grainEnabled }) => {
      const [copied, setCopied] = useState(false);

      const generateCode = useMemo(() => {
        const lines = [
          '// ========================================',
          '// Usage: Copy this code into your project',
          '// ========================================',
          '',
          '// Current Configuration:',
          `// - Colors: ${params.color1}, ${params.color2}, ${params.color3}`,
          `// - Dot Grid: ${dotGridEnabled ? 'Enabled' : 'Disabled'}`,
          `// - Grain Effect: ${grainEnabled ? 'Enabled' : 'Disabled'}`,
          '',
          '<Grainient',
          `  color1="${params.color1}"`,
          `  color2="${params.color2}"`,
          `  color3="${params.color3}"`,
          `  zoom={${params.zoom}}`,
          `  timeSpeed={${params.timeSpeed}}`,
          `  warpSpeed={${params.warpSpeed}}`,
          `  warpStrength={${params.warpStrength}}`,
          `  warpAmplitude={${params.warpAmplitude}}`,
          `  warpFrequency={${params.warpFrequency}}`,
          `  colorBalance={${params.colorBalance}}`,
          grainEnabled ? '  grainEnabled={true}' : '',
          '/>'
        ].filter(Boolean);
        
        return lines.join('\n');
      }, [params, dotGridEnabled, grainEnabled]);

      const copyCode = useCallback(async () => {
        try {
          await navigator.clipboard.writeText(generateCode);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error('Failed to copy:', err);
        }
      }, [generateCode]);

      return (
        <div className="code-block-container">
          <div className="code-header">
            <span className="code-label">JSX</span>
            <button
              className={`copy-button ${copied ? 'copied' : ''}`}
              onClick={copyCode}
            >
              {copied ? '已复制!' : '复制代码'}
            </button>
          </div>
          <div className="code-block">
            <pre>{generateCode}</pre>
          </div>
        </div>
      );
    };

    const DownloadButton = ({ params, dotGridEnabled = false, grainEnabled = false }) => {
      const [isDownloading, setIsDownloading] = useState(false);

      const downloadPng = useCallback(async () => {
        setIsDownloading(true);
        
        try {
          const width = 1920;
          const height = 1080;
          
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const gl = canvas.getContext('webgl2');
          
          if (!gl) {
            throw new Error('WebGL2 not supported');
          }

          const vertexShaderSource = `#version 300 es
            in vec2 position;
            void main() {
              gl_Position = vec4(position, 0.0, 1.0);
            }
          `;

          const fragmentShaderSource = `#version 300 es
            precision highp float;
            uniform vec2 iResolution;
            uniform float iTime;
            uniform float uTimeSpeed;
            uniform float uColorBalance;
            uniform float uWarpStrength;
            uniform float uWarpFrequency;
            uniform float uWarpSpeed;
            uniform float uWarpAmplitude;
            uniform float uBlendAngle;
            uniform float uBlendSoftness;
            uniform float uRotationAmount;
            uniform float uNoiseScale;
            uniform float uContrast;
            uniform float uGamma;
            uniform float uSaturation;
            uniform vec2 uCenterOffset;
            uniform float uZoom;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;
            uniform float uGrainEnabled;
            out vec4 fragColor;
            
            #define S(a,b,t) smoothstep(a,b,t)
            
            mat2 Rot(float a) {
              float s = sin(a), c = cos(a);
              return mat2(c, -s, s, c);
            }
            
            vec2 hash(vec2 p) {
              p = vec2(dot(p, vec2(2127.1, 81.17)), dot(p, vec2(1269.5, 283.37)));
              return fract(sin(p) * 43758.5453);
            }
            
            float noise(vec2 p) {
              vec2 i = floor(p), f = fract(p), u = f * f * (3.0 - 2.0 * f);
              float n = mix(
                mix(
                  dot(-1.0 + 2.0 * hash(i + vec2(0.0, 0.0)), f - vec2(0.0, 0.0)),
                  dot(-1.0 + 2.0 * hash(i + vec2(1.0, 0.0)), f - vec2(1.0, 0.0)),
                  u.x
                ),
                mix(
                  dot(-1.0 + 2.0 * hash(i + vec2(0.0, 1.0)), f - vec2(0.0, 1.0)),
                  dot(-1.0 + 2.0 * hash(i + vec2(1.0, 1.0)), f - vec2(1.0, 1.0)),
                  u.x
                ),
                u.y
              );
              return 0.5 + 0.5 * n;
            }
            
            void mainImage(out vec4 o, vec2 C) {
              float t = 0.0;
              vec2 uv = C / iResolution.xy;
              float ratio = iResolution.x / iResolution.y;
              vec2 tuv = uv - 0.5 + uCenterOffset;
              tuv /= max(uZoom, 0.001);
              
              float degree = noise(vec2(t * 0.1, tuv.x * tuv.y) * uNoiseScale);
              tuv.y *= 1.0 / ratio;
              tuv *= Rot(radians((degree - 0.5) * uRotationAmount + 180.0));
              tuv.y *= ratio;
              
              float frequency = uWarpFrequency;
              float ws = max(uWarpStrength, 0.001);
              float amplitude = uWarpAmplitude / ws;
              float warpTime = t * uWarpSpeed;
              tuv.x += sin(tuv.y * frequency + warpTime) / amplitude;
              tuv.y += sin(tuv.x * (frequency * 1.5) + warpTime) / (amplitude * 0.5);
              
              vec3 colLav = uColor1;
              vec3 colOrg = uColor2;
              vec3 colDark = uColor3;
              float b = uColorBalance;
              float s = max(uBlendSoftness, 0.0);
              mat2 blendRot = Rot(radians(uBlendAngle));
              float blendX = (tuv * blendRot).x;
              float edge0 = -0.3 - b - s;
              float edge1 = 0.2 - b + s;
              float v0 = 0.5 - b + s;
              float v1 = -0.3 - b - s;
              vec3 layer1 = mix(colDark, colOrg, S(edge0, edge1, blendX));
              vec3 layer2 = mix(colOrg, colLav, S(edge0, edge1, blendX));
              vec3 col = mix(layer1, layer2, S(v0, v1, tuv.y));
              
              col = (col - 0.5) * uContrast + 0.5;
              float luma = dot(col, vec3(0.2126, 0.7152, 0.0722));
              col = mix(vec3(luma), col, uSaturation);
              col = pow(max(col, 0.0), vec3(1.0 / max(uGamma, 0.001)));
              col = clamp(col, 0.0, 1.0);
              
              if (uGrainEnabled > 0.5) {
                float grain = fract(sin(dot(C.xy, vec2(12.9898, 78.233))) * 43758.5453);
                col += (grain - 0.5) * 0.08;
                col = clamp(col, 0.0, 1.0);
              }
              
              o = vec4(col, 1.0);
            }
            
            void main() {
              vec4 o = vec4(0.0);
              mainImage(o, gl_FragCoord.xy);
              fragColor = o;
            }
          `;

          const compileShader = (type, source) => {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            return shader;
          };

          const vertexShader = compileShader(gl.VERTEX_SHADER, vertexShaderSource);
          const fragmentShader = compileShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

          const program = gl.createProgram();
          gl.attachShader(program, vertexShader);
          gl.attachShader(program, fragmentShader);
          gl.linkProgram(program);
          gl.useProgram(program);

          const positions = new Float32Array([-1, -1, 3, -1, -1, 3]);
          const positionBuffer = gl.createBuffer();
          gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
          gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

          const positionLocation = gl.getAttribLocation(program, 'position');
          gl.enableVertexAttribArray(positionLocation);
          gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

          const hexToRgb3 = (hex) => {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            if (!result) return [1, 1, 1];
            return [
              parseInt(result[1], 16) / 255,
              parseInt(result[2], 16) / 255,
              parseInt(result[3], 16) / 255
            ];
          };

          const color1 = hexToRgb3(params.color1);
          const color2 = hexToRgb3(params.color2);
          const color3 = hexToRgb3(params.color3);

          gl.viewport(0, 0, width, height);
          gl.uniform2f(gl.getUniformLocation(program, 'iResolution'), width, height);
          gl.uniform1f(gl.getUniformLocation(program, 'iTime'), 0);
          gl.uniform1f(gl.getUniformLocation(program, 'uTimeSpeed'), params.timeSpeed);
          gl.uniform1f(gl.getUniformLocation(program, 'uColorBalance'), params.colorBalance);
          gl.uniform1f(gl.getUniformLocation(program, 'uWarpStrength'), params.warpStrength);
          gl.uniform1f(gl.getUniformLocation(program, 'uWarpFrequency'), params.warpFrequency);
          gl.uniform1f(gl.getUniformLocation(program, 'uWarpSpeed'), params.warpSpeed);
          gl.uniform1f(gl.getUniformLocation(program, 'uWarpAmplitude'), params.warpAmplitude);
          gl.uniform1f(gl.getUniformLocation(program, 'uBlendAngle'), 0);
          gl.uniform1f(gl.getUniformLocation(program, 'uBlendSoftness'), 0.05);
          gl.uniform1f(gl.getUniformLocation(program, 'uRotationAmount'), 500);
          gl.uniform1f(gl.getUniformLocation(program, 'uNoiseScale'), 2);
          gl.uniform1f(gl.getUniformLocation(program, 'uContrast'), 1.5);
          gl.uniform1f(gl.getUniformLocation(program, 'uGamma'), 1);
          gl.uniform1f(gl.getUniformLocation(program, 'uSaturation'), 1);
          gl.uniform2f(gl.getUniformLocation(program, 'uCenterOffset'), 0, 0);
          gl.uniform1f(gl.getUniformLocation(program, 'uZoom'), params.zoom);
          gl.uniform3fv(gl.getUniformLocation(program, 'uColor1'), color1);
          gl.uniform3fv(gl.getUniformLocation(program, 'uColor2'), color2);
          gl.uniform3fv(gl.getUniformLocation(program, 'uColor3'), color3);
          gl.uniform1f(gl.getUniformLocation(program, 'uGrainEnabled'), grainEnabled ? 1.0 : 0.0);

          gl.drawArrays(gl.TRIANGLES, 0, 3);

          let finalCanvas = canvas;

          if (dotGridEnabled) {
            const dotCanvas = document.createElement('canvas');
            dotCanvas.width = width;
            dotCanvas.height = height;
            const ctx = dotCanvas.getContext('2d');
            
            const dotSize = 5;
            const gap = 15;
            const cell = dotSize + gap;
            const cols = Math.floor((width + gap) / cell);
            const rows = Math.floor((height + gap) / cell);
            const gridW = cell * cols - gap;
            const gridH = cell * rows - gap;
            const extraX = (width - gridW) / 2 + dotSize / 2;
            const extraY = (height - gridH) / 2 + dotSize / 2;
            
            for (let y = 0; y < rows; y++) {
              for (let x = 0; x < cols; x++) {
                const cx = extraX + x * cell;
                const cy = extraY + y * cell;
                ctx.beginPath();
                ctx.arc(cx, cy, dotSize / 2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
                ctx.fill();
              }
            }
            
            const mergeCanvas = document.createElement('canvas');
            mergeCanvas.width = width;
            mergeCanvas.height = height;
            const mergeCtx = mergeCanvas.getContext('2d');
            mergeCtx.drawImage(canvas, 0, 0);
            mergeCtx.drawImage(dotCanvas, 0, 0);
            finalCanvas = mergeCanvas;
          }

          const link = document.createElement('a');
          link.download = 'grainient-1920x1080.png';
          link.href = finalCanvas.toDataURL('image/png');
          link.click();
        } catch (err) {
          console.error('Failed to download PNG:', err);
          alert('下载失败，请重试');
        } finally {
          setIsDownloading(false);
        }
      }, [params, dotGridEnabled, grainEnabled]);

      return (
        <div className="download-section">
          <div className="download-button-container">
            <button
              className="download-button"
              onClick={downloadPng}
              disabled={isDownloading}
            >
              {isDownloading ? '下载中...' : '下载PNG'}
            </button>
          </div>
        </div>
      );
    };

    const App = () => {
      const [params, setParams] = useState({
        color1: '#8ba7a5',
        color2: '#0d3472',
        color3: '#000000',
        timeSpeed: 0.6,
        zoom: 2.2,
        warpSpeed: 4.4,
        warpAmplitude: 25,
        warpFrequency: 8.6,
        colorBalance: -0.07,
        warpStrength: 2.4
      });
      const [dotGridEnabled, setDotGridEnabled] = useState(false);
      const [grainEnabled, setGrainEnabled] = useState(false);
      const [activeTab, setActiveTab] = useState('preview');

      const updateParam = (key, value) => {
        setParams(prev => ({ ...prev, [key]: value }));
      };

      const toggleDotGrid = () => {
        setDotGridEnabled(!dotGridEnabled);
        if (!dotGridEnabled) {
          setGrainEnabled(false);
        }
      };

      const toggleGrain = () => {
        setGrainEnabled(!grainEnabled);
        if (!grainEnabled) {
          setDotGridEnabled(false);
        }
      };

      return (
        <>
          <CanvasComponent params={params} grainEnabled={grainEnabled} />
          {dotGridEnabled && (
            <DotGrid
              dotSize={5}
              gap={15}
              baseColor="#FFFFFF"
              baseOpacity={0.12}
              activeColor="#FFFFFF"
              activeOpacity={0.6}
              proximity={120}
            />
          )}
          <div className="logo-container">
            <img src="./logo.png" alt="Zhuowei AI Lab" />
          </div>
          <div className="control-panel">
            <h2 className="panel-title">弥散渐变生成器</h2>
            <Nav activeTab={activeTab} onTabChange={setActiveTab} />
            
            <div className="panel-scroll-content">
              {activeTab === 'preview' ? (
                <>
                  <div className="section-title">颜色</div>
                  <div className="control-group">
                    <div className="color-row">
                      <ColorInput
                        label="Color 1"
                        value={params.color1}
                        onChange={(v) => updateParam('color1', v)}
                      />
                      <ColorInput
                        label="Color 2"
                        value={params.color2}
                        onChange={(v) => updateParam('color2', v)}
                      />
                      <ColorInput
                        label="Color 3"
                        value={params.color3}
                        onChange={(v) => updateParam('color3', v)}
                      />
                    </div>
                  </div>

                  <div className="divider"></div>

                  <div className="section-title">动画</div>
                  <ControlSlider
                    label="Time Speed"
                    value={params.timeSpeed}
                    min={0}
                    max={10}
                    step={0.1}
                    onChange={(v) => updateParam('timeSpeed', v)}
                  />
                  <ControlSlider
                    label="Warp Speed"
                    value={params.warpSpeed}
                    min={0}
                    max={10}
                    step={0.1}
                    onChange={(v) => updateParam('warpSpeed', v)}
                  />

                  <div className="divider"></div>

                  <div className="section-title">变形</div>
                  <ControlSlider
                    label="Zoom"
                    value={params.zoom}
                    min={0}
                    max={10}
                    step={0.1}
                    onChange={(v) => updateParam('zoom', v)}
                  />
                  <ControlSlider
                    label="Warp Strength"
                    value={params.warpStrength}
                    min={0}
                    max={10}
                    step={0.1}
                    onChange={(v) => updateParam('warpStrength', v)}
                  />
                  <ControlSlider
                    label="Warp Amplitude"
                    value={params.warpAmplitude}
                    min={0}
                    max={50}
                    step={0.5}
                    onChange={(v) => updateParam('warpAmplitude', v)}
                  />
                  <ControlSlider
                    label="Warp Frequency"
                    value={params.warpFrequency}
                    min={0}
                    max={20}
                    step={0.1}
                    onChange={(v) => updateParam('warpFrequency', v)}
                  />
                  <ControlSlider
                    label="Color Balance"
                    value={params.colorBalance}
                    min={-1}
                    max={1}
                    step={0.01}
                    onChange={(v) => updateParam('colorBalance', v)}
                  />
                  
                  <div className="divider"></div>
                  <ToggleSwitch
                    label="Dot Grid"
                    active={dotGridEnabled}
                    onToggle={toggleDotGrid}
                  />
                  <ToggleSwitch
                    label="颗粒底纹"
                    active={grainEnabled}
                    onToggle={toggleGrain}
                  />
                </>
              ) : (
                <CodePreview params={params} dotGridEnabled={dotGridEnabled} grainEnabled={grainEnabled} />
              )}
            </div>
            
            {activeTab === 'preview' && (
              <DownloadButton params={params} dotGridEnabled={dotGridEnabled} grainEnabled={grainEnabled} />
            )}
          </div>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
